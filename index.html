<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MANGAMICS</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#000;
      color:#fff;
      overflow-x:hidden;
    }

    header{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:22px;
      border-bottom:1px solid #111;
      position:sticky;
      top:0;
      background:#000;
      z-index:10;
    }

    .logo{
      font-size:30px;
      letter-spacing:10px;
      font-weight:900;
      text-transform:uppercase;
      text-shadow:0 0 10px rgba(255,255,255,0.15);
    }

    .container{
      padding:20px;
      max-width:1200px;
      margin:auto;
    }

    .panel{
      background:#0b0b0b;
      border:1px solid #222;
      padding:20px;
      border-radius:14px;
      margin-bottom:25px;
    }

    input{
      width:100%;
      padding:14px;
      margin:8px 0;
      border-radius:10px;
      border:1px solid #222;
      background:#111;
      color:#fff;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#fff;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{opacity:0.85;}

    .row-title{
      margin:18px 0 10px;
      font-size:18px;
      font-weight:bold;
    }

    .row{
      overflow:hidden;
      width:100%;
      position:relative;
    }

    .track{
      display:flex;
      gap:14px;
      width:max-content;
      animation:scroll 18s linear infinite;
    }

    @keyframes scroll{
      0%{transform:translateX(0)}
      100%{transform:translateX(-50%)}
    }

    .card{
      min-width:240px;
      background:#111;
      border:1px solid #222;
      border-radius:12px;
      overflow:hidden;
      flex:0 0 auto;
      transition:0.3s;
    }

    .card:hover{transform:scale(1.06);}

    .card img{
      width:100%;
      height:320px;
      object-fit:cover;
    }

    .card p{
      margin:0;
      padding:10px;
      text-align:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:15px;
    }

  </style>
</head>
<body>

<header>
  <div class="logo">MANGAMICS</div>
</header>

<div class="container">

  <div class="panel">
    <h2>🎯 AI Mood Engine</h2>
    <input id="mood" placeholder="Mood (oscuro, epico, leggero, psicologico)">
    <input id="genre" placeholder="Genere (azione, fantasy, thriller)">
    <input id="style" placeholder="Stile (manga, comics)">
    <button onclick="generateAI()">Genera consigli AI</button>
  </div>

  <div class="row-title">🏆 Ultimate Best Works</div>
  <div class="row">
    <div class="track" id="best"></div>
  </div>

  <div class="row-title">🌍 Live Trending Universe</div>
  <div class="row">
    <div class="track" id="trend"></div>
  </div>

</div>

<script>

const db = [
  {t:"One Piece",img:"https://cdn.myanimelist.net/images/manga/2/253146.jpg",m:"epico",g:"azione",score:10},
  {t:"Berserk",img:"https://cdn.myanimelist.net/images/manga/1/157897.jpg",m:"oscuro",g:"fantasy",score:10},
  {t:"Attack on Titan",img:"https://cdn.myanimelist.net/images/manga/2/37846.jpg",m:"oscuro",g:"azione",score:10},
  {t:"Death Note",img:"https://cdn.myanimelist.net/images/manga/2/153541.jpg",m:"psicologico",g:"thriller",score:9},
  {t:"Vinland Saga",img:"https://cdn.myanimelist.net/images/manga/2/159492.jpg",m:"drammatico",g:"azione",score:9},
  {t:"Vagabond",img:"https://cdn.myanimelist.net/images/manga/1/259070.jpg",m:"realistico",g:"azione",score:10},
  {t:"Chainsaw Man",img:"https://cdn.myanimelist.net/images/manga/3/216464.jpg",m:"caos",g:"azione",score:9},
  {t:"Jujutsu Kaisen",img:"https://cdn.myanimelist.net/images/manga/3/216292.jpg",m:"oscuro",g:"azione",score:9},
  {t:"Spy x Family",img:"https://cdn.myanimelist.net/images/manga/3/188896.jpg",m:"leggero",g:"azione",score:8},
  {t:"Solo Leveling",img:"https://cdn.myanimelist.net/images/manga/3/222295.jpg",m:"epico",g:"fantasy",score:9},
  {t:"Batman",img:"https://upload.wikimedia.org/wikipedia/en/1/17/Batman_Comic_Book.jpg",m:"oscuro",g:"azione",score:10},
  {t:"Spider-Man",img:"https://upload.wikimedia.org/wikipedia/en/0/0c/Spider-Man_%282002_film%29_poster.jpg",m:"eroe",g:"azione",score:9}
];

function card(item){
  return `<div class='card'><img src='${item.img}'><p>${item.t}</p></div>`;
}

// AI-like scoring engine
function generateAI(){
  const mood=document.getElementById("mood").value.toLowerCase();
  const genre=document.getElementById("genre").value.toLowerCase();

  let results=db.map(x=>{
    let score=x.score;

    if(mood && x.m.includes(mood)) score+=2;
    if(genre && x.g.includes(genre)) score+=2;

    return {...x,score};
  });

  results.sort((a,b)=>b.score-a.score);

  document.getElementById("trend").innerHTML=results.slice(0,5).map(card).join("");
}

function loadBest(){
  const best=[...db].sort(()=>Math.random()-0.5).slice(0,5);
  const loop=[...best,...best];
  document.getElementById("best").innerHTML=loop.map(card).join("");
}

function loadTrend(){
  const mix=[...db].sort(()=>Math.random()-0.5).slice(0,5);
  const loop=[...mix,...mix];
  document.getElementById("trend").innerHTML=loop.map(card).join("");
}

loadBest();
loadTrend();
setInterval(loadBest,5000);
setInterval(loadTrend,4000);

</script>

</body>
</html>
