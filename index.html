<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mangamics</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#000;
      color:#fff;
    }

    header{
      padding:18px 24px;
      font-size:26px;
      font-weight:bold;
      border-bottom:1px solid #222;
      position:sticky;
      top:0;
      background:#000;
      z-index:10;
    }

    .hero{
      height:320px;
      background:linear-gradient(to right, #000, rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1526401485004-2fda9f0b4f3a?auto=format&fit=crop&w=1400&q=60');
      background-size:cover;
      display:flex;
      align-items:center;
      padding:30px;
    }

    .hero h1{
      font-size:42px;
      margin:0;
    }

    .hero p{
      max-width:500px;
      color:#ccc;
    }

    .container{
      padding:20px;
      max-width:1200px;
      margin:auto;
    }

    .panel{
      background:#0b0b0b;
      padding:18px;
      border:1px solid #222;
      border-radius:12px;
      margin-bottom:25px;
    }

    input{
      width:100%;
      padding:12px;
      margin:6px 0;
      border-radius:8px;
      border:none;
      background:#111;
      color:#fff;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#fff;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{ opacity:0.8; }

    .row-title{
      margin:18px 0 10px;
      font-size:18px;
      font-weight:bold;
    }

    .row{
      display:flex;
      overflow-x:auto;
      gap:12px;
      scroll-snap-type:x mandatory;
      padding-bottom:10px;
    }

    .card{
      min-width:160px;
      background:#111;
      border-radius:10px;
      overflow:hidden;
      border:1px solid #222;
      flex:0 0 auto;
      scroll-snap-align:start;
      transition:0.3s;
    }

    .card:hover{ transform:scale(1.08); }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card p{
      margin:0;
      padding:8px;
      font-size:13px;
      text-align:center;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
      gap:15px;
    }

    .badge{
      font-size:12px;
      color:#aaa;
    }
  </style>
</head>
<body>

<header>mangamics</header>

<div class="hero">
  <div>
    <h1>Trova il tuo prossimo manga</h1>
    <p>Personalizzato sui tuoi gusti. Stile Netflix + AI recommendation.</p>
  </div>
</div>

<div class="container">

  <div class="panel">
    <h2>I tuoi gusti</h2>
    <input id="mood" placeholder="Mood (oscuro, epico, leggero)">
    <input id="genre" placeholder="Genere (azione, fantasy...)">
    <input id="style" placeholder="Stile (manga, comics)">
    <button onclick="recommend()">Genera consigli</button>
  </div>

  <div class="row-title">🔥 Consigli per te</div>
  <div id="results" class="row"></div>

  <div class="row-title">🌍 Trending mondiale</div>
  <div id="popular" class="row"></div>

</div>

<script>
const db = [
  {t:"Attack on Titan",img:"https://via.placeholder.com/300x400?text=AOT",m:"oscuro",g:"azione"},
  {t:"One Piece",img:"https://via.placeholder.com/300x400?text=OP",m:"epico",g:"azione"},
  {t:"Berserk",img:"https://via.placeholder.com/300x400?text=Berserk",m:"oscuro",g:"fantasy"},
  {t:"Death Note",img:"https://via.placeholder.com/300x400?text=DN",m:"psicologico",g:"thriller"},
  {t:"Naruto",img:"https://via.placeholder.com/300x400?text=Naruto",m:"epico",g:"azione"}
];

const trending = ["Dragon Ball","One Piece","Naruto","Bleach","Jujutsu Kaisen","Chainsaw Man","Tokyo Ghoul","Berserk"];

function card(item){
  return `<div class='card'><img src='${item.img}'><p>${item.t}</p></div>`;
}

function recommend(){
  const mood=document.getElementById("mood").value.toLowerCase();
  const genre=document.getElementById("genre").value.toLowerCase();

  let res = db.filter(x=>
    (!mood || x.m.includes(mood)) &&
    (!genre || x.g.includes(genre))
  );

  document.getElementById("results").innerHTML = res.length ? res.map(card).join("") : "<p class='badge'>Nessun risultato preciso, prova a cambiare i gusti</p>";
}

function loadTrending(){
  let mix=[...trending].sort(()=>Math.random()-0.5);
  document.getElementById("popular").innerHTML = mix.map(n=>
    `<div class='card'><img src='https://via.placeholder.com/300x400?text=${encodeURIComponent(n)}'><p>${n}</p></div>`
  ).join("");
}

loadTrending();
</script>

</body>
</html>
