<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MANGAMICS</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#000;
      color:#fff;
      overflow-x:hidden;
    }

    header{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:22px;
      border-bottom:1px solid #111;
      position:sticky;
      top:0;
      background:#000;
      z-index:10;
    }

    .logo{
      font-size:30px;
      letter-spacing:8px;
      font-weight:900;
      text-transform:uppercase;
    }

    .container{
      padding:20px;
      max-width:1200px;
      margin:auto;
    }

    .panel{
      background:#0b0b0b;
      border:1px solid #222;
      padding:20px;
      border-radius:14px;
      margin-bottom:25px;
    }

    input{
      width:100%;
      padding:14px;
      margin:8px 0;
      border-radius:10px;
      border:1px solid #222;
      background:#111;
      color:#fff;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#fff;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{opacity:0.85;}

    .row-title{
      margin:18px 0 10px;
      font-size:18px;
      font-weight:bold;
    }

    /* CAROUSEL FLUIDO */
    .row{
      overflow:hidden;
      width:100%;
      position:relative;
    }

    .track{
      display:flex;
      gap:14px;
      width:max-content;
      animation:scroll 18s linear infinite;
    }

    @keyframes scroll{
      0%{transform:translateX(0)}
      100%{transform:translateX(-50%)}
    }

    .card{
      min-width:240px;
      background:#111;
      border:1px solid #222;
      border-radius:12px;
      overflow:hidden;
      flex:0 0 auto;
      transition:0.3s;
    }

    .card:hover{transform:scale(1.06);}

    .card img{
      width:100%;
      height:320px;
      object-fit:cover;
    }

    .card p{
      margin:0;
      padding:10px;
      text-align:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:15px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">MANGAMICS</div>
</header>

<div class="container">

  <!-- INPUT GUSTI -->
  <div class="panel">
    <h2>Personalizza i tuoi gusti</h2>
    <input id="mood" placeholder="Mood (oscuro, epico, leggero)">
    <input id="genre" placeholder="Genere (azione, fantasy, thriller)">
    <input id="style" placeholder="Stile (manga, comics)">
    <button onclick="generate()">Genera consigli</button>
  </div>

  <!-- NUOVA SEZIONE: BEST OPERE MONDO -->
  <div class="row-title">🏆 Migliori opere del mondo fumettistico</div>
  <div class="row">
    <div class="track" id="best"></div>
  </div>

  <!-- SEZIONE RANDOM ODIERNA (PRESERVATA) -->
  <div class="row-title">🌍 Manga & Comics più famosi</div>
  <div class="row">
    <div class="track" id="trend"></div>
  </div>

</div>

<script>

const db = [
  {t:"One Piece",img:"https://cdn.myanimelist.net/images/manga/2/253146.jpg"},
  {t:"Naruto",img:"https://cdn.myanimelist.net/images/manga/3/249658.jpg"},
  {t:"Attack on Titan",img:"https://cdn.myanimelist.net/images/manga/2/37846.jpg"},
  {t:"Berserk",img:"https://cdn.myanimelist.net/images/manga/1/157897.jpg"},
  {t:"Death Note",img:"https://cdn.myanimelist.net/images/manga/2/153541.jpg"},
  {t:"Chainsaw Man",img:"https://cdn.myanimelist.net/images/manga/3/216464.jpg"},
  {t:"Jujutsu Kaisen",img:"https://cdn.myanimelist.net/images/manga/3/216292.jpg"},
  {t:"Spy x Family",img:"https://cdn.myanimelist.net/images/manga/3/188896.jpg"},
  {t:"Vinland Saga",img:"https://cdn.myanimelist.net/images/manga/2/159492.jpg"},
  {t:"Vagabond",img:"https://cdn.myanimelist.net/images/manga/1/259070.jpg"},
  {t:"Solo Leveling",img:"https://cdn.myanimelist.net/images/manga/3/222295.jpg"},
  {t:"Batman",img:"https://upload.wikimedia.org/wikipedia/en/1/17/Batman_Comic_Book.jpg"},
  {t:"Spider-Man",img:"https://upload.wikimedia.org/wikipedia/en/0/0c/Spider-Man_%282002_film%29_poster.jpg"},
  {t:"Watchmen",img:"https://upload.wikimedia.org/wikipedia/en/a/a7/Watchmen_first_edition_cover.jpg"},
  {t:"The Boys",img:"https://upload.wikimedia.org/wikipedia/en/4/4c/The_Boys_%28comics%29.jpg"},
  {t:"Superman",img:"https://upload.wikimedia.org/wikipedia/en/3/35/Supermanflying.png"}
];

function card(item){
  return `<div class='card'><img src='${item.img}'><p>${item.t}</p></div>`;
}

function generate(){
  const mood=document.getElementById("mood").value.toLowerCase();
  const genre=document.getElementById("genre").value.toLowerCase();

  const res=db.filter(x=>(!mood||x.t.toLowerCase().includes(mood)));

  document.getElementById("trend").innerHTML=res.slice(0,5).map(card).join("");
}

// BEST OPERE (DINAMICO)
function loadBest(){
  const best=[...db].sort(()=>Math.random()-0.5).slice(0,5);
  const loop=[...best,...best];
  document.getElementById("best").innerHTML=loop.map(card).join("");
}

// TRENDING (DINAMICO)
function loadTrend(){
  const mix=[...db].sort(()=>Math.random()-0.5).slice(0,5);
  const loop=[...mix,...mix];
  document.getElementById("trend").innerHTML=loop.map(card).join("");
}

loadBest();
loadTrend();
setInterval(loadBest,6000);
setInterval(loadTrend,4000);

</script>

</body>
</html>
