<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANGAMICS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0b0b0b, #050505);
  color: white;
}

/* LOGO RETRO SCI-FI */
.logo {
  text-align: center;
  font-size: 42px;
  letter-spacing: 8px;
  padding: 30px 10px;
  font-weight: bold;
  color: #00f0ff;
  text-shadow:
    0 0 5px #00f0ff,
    0 0 15px #00f0ff,
    0 0 30px #ff3c00;
  font-family: "Arial Black", sans-serif;
}

/* SETUP */
#setup {
  max-width: 700px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  background: #1a1a1a;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #ff3c00;
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
}

/* ROW STYLE (NETFLIX LIKE) */
.row {
  padding: 20px;
}

.row h2 {
  margin-left: 10px;
  color: #00f0ff;
}

.scroll {
  display: flex;
  overflow-x: auto;
  gap: 15px;
  padding: 10px;
}

/* CARD */
.card {
  min-width: 160px;
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(0,240,255,0.1);
}

.card:hover {
  transform: scale(1.08);
  box-shadow: 0 0 15px rgba(255,60,0,0.4);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.card p {
  margin: 5px;
  font-size: 13px;
}

/* SCROLLBAR */
.scroll::-webkit-scrollbar {
  height: 6px;
}
.scroll::-webkit-scrollbar-thumb {
  background: #ff3c00;
  border-radius: 10px;
}

/* HIDDEN */
.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="logo">MANGAMICS</div>

<!-- SETUP SEMPRE IN HOME -->
<div id="setup">
  <h2>🔥 Inserisci i tuoi gusti</h2>

  <input id="g1" placeholder="Genere 1 (es: azione)">
  <input id="g2" placeholder="Genere 2 (es: fantasy)">
  <input id="g3" placeholder="Genere 3 (es: horror)">

  <button onclick="start()">Attiva universo consigli</button>
</div>

<!-- CONTENUTO -->
<div id="app">

  <div class="row">
    <h2>🎲 Esplora il multiverso manga</h2>
    <div id="random" class="scroll"></div>
  </div>

  <div class="row">
    <h2>🔥 Consigli per te</h2>
    <div id="results" class="scroll"></div>
  </div>

</div>

<script>

const database = [
  { titolo:"Attack on Titan", genere:"azione", img:"https://upload.wikimedia.org/wikipedia/en/7/7a/Attack_on_Titan_cover.jpg" },
  { titolo:"One Piece", genere:"azione", img:"https://upload.wikimedia.org/wikipedia/en/6/6f/OnePiece_cover.png" },
  { titolo:"Naruto", genere:"azione", img:"https://upload.wikimedia.org/wikipedia/en/9/94/NarutoCoverTankobon1.jpg" },
  { titolo:"Berserk", genere:"fantasy", img:"https://upload.wikimedia.org/wikipedia/en/4/4a/Berserk_vol01.png" },
  { titolo:"Tokyo Ghoul", genere:"horror", img:"https://upload.wikimedia.org/wikipedia/en/5/5a/Tokyo_Ghoul_volume_1_cover.jpg" },
  { titolo:"Death Note", genere:"horror", img:"https://upload.wikimedia.org/wikipedia/en/6/6f/Death_Note_Vol_1.jpg" },
  { titolo:"Dragon Ball", genere:"azione", img:"https://upload.wikimedia.org/wikipedia/en/4/4c/Dragon_Ball_volume_1.png" }
];

let userGenres = [];

function card(item){
  return `
  <div class="card">
    <img src="${item.img}">
    <p><b>${item.titolo}</b></p>
  </div>`;
}

/* START */
function start(){
  userGenres = [
    document.getElementById("g1").value.toLowerCase(),
    document.getElementById("g2").value.toLowerCase(),
    document.getElementById("g3").value.toLowerCase()
  ];

  loadRecommendations();
}

/* RANDOM HOME ROW */
function loadRandom(){
  const shuffled = [...database].sort(() => 0.5 - Math.random());
  document.getElementById("random").innerHTML =
    shuffled.slice(0,6).map(card).join("");
}

/* RECOMMENDATIONS */
function loadRecommendations(){
  const filtered = database.filter(m => userGenres.includes(m.genere));
  document.getElementById("results").innerHTML =
    filtered.length ? filtered.map(card).join("")
    : "<p style='padding:10px'>Nessun match trovato 😢 prova altri gusti</p>";
}

/* INIT */
loadRandom();

</script>

</body>
</html>
