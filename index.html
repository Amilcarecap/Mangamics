<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANGAMICS</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#000;
  color:#fff;
}

header{
  display:flex;
  justify-content:center;
  padding:20px;
  border-bottom:1px solid #111;
  position:sticky;
  top:0;
  background:#000;
}

.logo{
  font-size:28px;
  letter-spacing:8px;
  font-weight:900;
}

.container{
  padding:20px;
  max-width:1200px;
  margin:auto;
}

.panel{
  background:#0b0b0b;
  border:1px solid #222;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #222;
  background:#111;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#fff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.row-title{
  margin:20px 0 10px;
  font-weight:bold;
}

.row{
  overflow:hidden;
}

.track{
  display:flex;
  gap:14px;
  animation:scroll 20s linear infinite;
}

@keyframes scroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

.card{
  min-width:200px;
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:280px;
  object-fit:cover;
}

.card p{
  text-align:center;
  padding:8px;
}

.card small{
  display:block;
  text-align:center;
  opacity:0.6;
  padding-bottom:10px;
}
</style>
</head>

<body>

<header>
<div class="logo">MANGAMICS</div>
</header>

<div class="container">

<div class="panel">
<h2>🎯 AI Comic Finder</h2>

<input id="mood" placeholder="Mood (oscuro, epico, leggero, psicologico)" oninput="generateAI()">
<input id="genre" placeholder="Genere (azione, fantasy, thriller)" oninput="generateAI()">
<input id="style" placeholder="Stile (manga, comics)" oninput="generateAI()">

<button onclick="generateAI()">Genera consigli</button>
</div>

<div class="row-title">🏆 Best Picks</div>
<div class="row">
<div class="track" id="best"></div>
</div>

<div class="row-title">🔍 Risultati AI</div>
<div class="row">
<div class="track" id="results"></div>
</div>

</div>

<script>

// DATABASE
const db = [
{t:"One Piece",img:"https://cdn.myanimelist.net/images/manga/2/253146.jpg",m:"epico",g:"azione",s:"manga"},
{t:"Berserk",img:"https://cdn.myanimelist.net/images/manga/1/157897.jpg",m:"oscuro",g:"fantasy",s:"manga"},
{t:"Attack on Titan",img:"https://cdn.myanimelist.net/images/manga/2/37846.jpg",m:"oscuro",g:"azione",s:"manga"},
{t:"Death Note",img:"https://cdn.myanimelist.net/images/manga/2/153541.jpg",m:"psicologico",g:"thriller",s:"manga"},
{t:"Vinland Saga",img:"https://cdn.myanimelist.net/images/manga/2/159492.jpg",m:"drammatico",g:"azione",s:"manga"},
{t:"Chainsaw Man",img:"https://cdn.myanimelist.net/images/manga/3/216464.jpg",m:"caos",g:"azione",s:"manga"},
{t:"Jujutsu Kaisen",img:"https://cdn.myanimelist.net/images/manga/3/216292.jpg",m:"oscuro",g:"azione",s:"manga"},
{t:"Spy x Family",img:"https://cdn.myanimelist.net/images/manga/3/188896.jpg",m:"leggero",g:"azione",s:"manga"},
{t:"Solo Leveling",img:"https://cdn.myanimelist.net/images/manga/3/222295.jpg",m:"epico",g:"fantasy",s:"manga"},
{t:"Batman",img:"https://upload.wikimedia.org/wikipedia/en/1/17/Batman_Comic_Book.jpg",m:"oscuro",g:"azione",s:"comics"},
{t:"Spider-Man",img:"https://upload.wikimedia.org/wikipedia/en/0/0c/Spider-Man_%282002_film%29_poster.jpg",m:"eroe",g:"azione",s:"comics"}
];

// CARD
function card(item){
return `
<div class="card">
<img src="${item.img}">
<p>${item.t}</p>
<small>Compatibilità: ${item.score?.toFixed(1) || "—"}</small>
</div>
`;
}

// AI ENGINE
function generateAI(){

const mood = document.getElementById("mood").value.toLowerCase().trim();
const genre = document.getElementById("genre").value.toLowerCase().trim();
const style = document.getElementById("style").value.toLowerCase().trim();

let results = db.map(x => {

let score = 0;

if(mood && x.m.includes(mood)) score += 3;
if(genre && x.g.includes(genre)) score += 3;
if(style && x.s.includes(style)) score += 2;

// bonus match completo
if(mood && genre && style &&
x.m.includes(mood) &&
x.g.includes(genre) &&
x.s.includes(style)){
score += 5;
}

// effetto AI
score += Math.random();

return {...x, score};

});

// filtro reale
results = results.filter(x => x.score > 2);

// ordina
results.sort((a,b)=>b.score-a.score);

const container = document.getElementById("results");

// blocca animazione
container.style.animation = "none";

if(results.length === 0){
container.innerHTML = "<p style='padding:20px'>Nessun risultato 😢</p>";
return;
}

container.innerHTML = results.map(card).join("");

}

// BEST LOOP
function loadBest(){
const best = [...db].sort(()=>Math.random()-0.5).slice(0,5);
const loop = [...best,...best];
document.getElementById("best").innerHTML = loop.map(card).join("");
}

loadBest();
setInterval(loadBest,5000);

</script>

</body>
</html>
