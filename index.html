<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mangamics</title>

  <style>
    body{
      margin:0;
      font-family: 'Arial', sans-serif;
      background:#000;
      color:#fff;
      overflow-x:hidden;
    }

    /* HEADER LOGO SCI-FI */
    header{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:25px;
      border-bottom:1px solid #111;
      position:sticky;
      top:0;
      background:#000;
      z-index:10;
    }

    .logo{
      font-size:32px;
      letter-spacing:6px;
      font-weight:bold;
      text-transform:uppercase;
      color:#fff;
      position:relative;
      text-shadow:0 0 10px rgba(255,255,255,0.3), 0 0 20px rgba(255,255,255,0.1);
    }

    .logo::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-6px;
      width:100%;
      height:2px;
      background:linear-gradient(90deg,transparent,#fff,transparent);
      animation:scan 2s linear infinite;
    }

    @keyframes scan{
      0%{transform:translateX(-100%)}
      100%{transform:translateX(100%)}
    }

    .container{
      padding:20px;
      max-width:1200px;
      margin:auto;
    }

    /* INPUT STYLE FUTURISTIC */
    .panel{
      border:1px solid #222;
      background:#050505;
      padding:20px;
      border-radius:14px;
      margin-bottom:25px;
      box-shadow:0 0 20px rgba(255,255,255,0.05);
    }

    input{
      width:100%;
      padding:14px;
      margin:8px 0;
      border-radius:10px;
      border:1px solid #222;
      background:#0a0a0a;
      color:#fff;
      outline:none;
      transition:0.3s;
    }

    input:focus{
      border-color:#fff;
      box-shadow:0 0 10px rgba(255,255,255,0.2);
    }

    button{
      width:100%;
      padding:14px;
      border-radius:10px;
      border:none;
      background:#fff;
      color:#000;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover{opacity:0.85;}

    /* CAROUSEL ANIMATO */
    .marquee{
      display:flex;
      gap:15px;
      animation:scroll 25s linear infinite;
      width:max-content;
    }

    @keyframes scroll{
      0%{transform:translateX(0)}
      100%{transform:translateX(-50%)}
    }

    .row{
      overflow:hidden;
      white-space:nowrap;
      border-top:1px solid #111;
      border-bottom:1px solid #111;
      padding:10px 0;
    }

    .card{
      min-width:160px;
      background:#0d0d0d;
      border:1px solid #222;
      border-radius:10px;
      overflow:hidden;
      flex:0 0 auto;
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card p{
      margin:0;
      padding:8px;
      font-size:13px;
      text-align:center;
    }

    /* GRID RISULTATI */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:15px;
      margin-top:20px;
    }

  </style>
</head>
<body>

<header>
  <div class="logo">MANGAMICS</div>
</header>

<div class="container">

  <div class="panel">
    <h2>Personalizza i tuoi gusti</h2>
    <input id="mood" placeholder="Mood (oscuro, epico, leggero)">
    <input id="genre" placeholder="Genere (azione, fantasy, romance)">
    <input id="style" placeholder="Stile (manga, comics, graphic novel)">
    <button onclick="generate()">Genera consigli</button>
  </div>

  <h3>🔥 Consigli per te</h3>
  <div id="results" class="grid"></div>

  <h3>🌍 Trending globale</h3>
  <div class="row">
    <div class="marquee" id="trend"></div>
  </div>

</div>

<script>
const db = [
  {t:"Attack on Titan",img:"https://cdn.myanimelist.net/images/anime/10/47347.jpg",m:"oscuro",g:"azione"},
  {t:"One Piece",img:"https://cdn.myanimelist.net/images/anime/6/73245.jpg",m:"epico",g:"azione"},
  {t:"Berserk",img:"https://cdn.myanimelist.net/images/anime/2/33061.jpg",m:"oscuro",g:"fantasy"},
  {t:"Death Note",img:"https://cdn.myanimelist.net/images/anime/9/9453.jpg",m:"psicologico",g:"thriller"},
  {t:"Naruto",img:"https://cdn.myanimelist.net/images/anime/13/17405.jpg",m:"epico",g:"azione"}
];

const trending = [...db, ...db, ...db]; // duplicato per effetto infinito

function card(item){
  return `<div class='card'><img src='${item.img}'><p>${item.t}</p></div>`;
}

function generate(){
  const mood=document.getElementById("mood").value.toLowerCase();
  const genre=document.getElementById("genre").value.toLowerCase();

  const res=db.filter(x=>(!mood||x.m.includes(mood))&&(!genre||x.g.includes(genre)));

  document.getElementById("results").innerHTML=res.map(card).join("");
}

function loadTrending(){
  document.getElementById("trend").innerHTML = trending
    .sort(()=>Math.random()-0.5)
    .map(card)
    .join("");
}

loadTrending();
</script>

</body>
</html>
