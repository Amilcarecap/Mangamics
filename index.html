<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mangamics</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: white;
}

/* HEADER */
header {
  background: #111;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
  color: #ff3c00;
}

/* ONBOARDING */
#setup {
  padding: 30px;
  max-width: 700px;
  margin: auto;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 6px;
  border: none;
}

button {
  background: #ff3c00;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* NETFLIX STYLE ROW */
.row {
  padding: 20px;
}

.row h2 {
  margin-left: 10px;
}

.scroll {
  display: flex;
  overflow-x: auto;
  gap: 15px;
  padding: 10px;
}

/* CARD */
.card {
  min-width: 160px;
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.card p {
  margin: 5px;
  font-size: 14px;
}

/* HIDE AFTER START */
.hidden {
  display: none;
}
</style>
</head>

<body>

<header>mangamics 🍿</header>

<!-- ONBOARDING -->
<div id="setup">
  <h2>Inserisci i tuoi gusti</h2>

  <input id="g1" placeholder="Genere 1 (es: azione)">
  <input id="g2" placeholder="Genere 2 (es: fantasy)">
  <input id="g3" placeholder="Genere 3 (es: horror)">

  <button onclick="start()">Attiva consigli</button>
</div>

<!-- CONTENT -->
<div id="app" class="hidden">

  <div class="row">
    <h2>Consigli per te</h2>
    <div id="results" class="scroll"></div>
  </div>

  <div class="row">
    <h2>Scelto del giorno</h2>
    <div id="daily" class="scroll"></div>
  </div>

</div>

<script>

const database = [
  { titolo:"Attack on Titan", genere:"azione", rating:9.5, img:"https://upload.wikimedia.org/wikipedia/en/7/7a/Attack_on_Titan_cover.jpg" },
  { titolo:"One Piece", genere:"azione", rating:9.7, img:"https://upload.wikimedia.org/wikipedia/en/6/6f/OnePiece_cover.png" },
  { titolo:"Your Name", genere:"romantico", rating:9.0, img:"https://upload.wikimedia.org/wikipedia/en/0/0b/Your_Name_poster.png" },
  { titolo:"Berserk", genere:"fantasy", rating:9.8, img:"https://upload.wikimedia.org/wikipedia/en/4/4a/Berserk_vol01.png" },
  { titolo:"Tokyo Ghoul", genere:"horror", rating:8.9, img:"https://upload.wikimedia.org/wikipedia/en/5/5a/Tokyo_Ghoul_volume_1_cover.jpg" }
];

let userGenres = [];

function card(item){
  return `
  <div class="card">
    <img src="${item.img}">
    <p><b>${item.titolo}</b></p>
    <p>⭐ ${item.rating}</p>
  </div>`;
}

function start(){
  userGenres = [
    document.getElementById("g1").value.toLowerCase(),
    document.getElementById("g2").value.toLowerCase(),
    document.getElementById("g3").value.toLowerCase()
  ];

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  loadRecommendations();
  loadDaily();
}

function loadRecommendations(){
  const filtered = database.filter(m => userGenres.includes(m.genere));
  document.getElementById("results").innerHTML =
    filtered.map(card).join("");
}

function loadDaily(){
  const pick = database[Math.floor(Math.random() * database.length)];
  document.getElementById("daily").innerHTML = card(pick);
}

</script>

</body>
</html>
