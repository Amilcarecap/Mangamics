<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MANGAMICS</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#000;
      color:#fff;
      overflow-x:hidden;
    }

    header{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:22px;
      border-bottom:1px solid #111;
      position:sticky;
      top:0;
      background:#000;
      z-index:10;
    }

    .logo{
      font-size:30px;
      letter-spacing:8px;
      font-weight:900;
      text-transform:uppercase;
      color:#fff;
    }

    .container{
      padding:20px;
      max-width:1200px;
      margin:auto;
    }

    .panel{
      background:#0b0b0b;
      border:1px solid #222;
      padding:20px;
      border-radius:14px;
      margin-bottom:25px;
    }

    input{
      width:100%;
      padding:14px;
      margin:8px 0;
      border-radius:10px;
      border:1px solid #222;
      background:#111;
      color:#fff;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#fff;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{opacity:0.85;}

    .row-title{
      margin:18px 0 10px;
      font-size:18px;
      font-weight:bold;
    }

    .row{
      display:flex;
      overflow-x:auto;
      gap:12px;
      padding-bottom:10px;
      scroll-snap-type:x mandatory;
    }

    .card{
      min-width:160px;
      background:#111;
      border:1px solid #222;
      border-radius:10px;
      overflow:hidden;
      flex:0 0 auto;
      scroll-snap-align:start;
      transition:0.3s;
    }

    .card:hover{ transform:scale(1.08); }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card p{
      margin:0;
      padding:8px;
      font-size:13px;
      text-align:center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">MANGAMICS</div>
</header>

<div class="container">

  <div class="panel">
    <h2>Personalizza i tuoi gusti</h2>
    <input id="mood" placeholder="Mood (oscuro, epico, leggero)">
    <input id="genre" placeholder="Genere (azione, fantasy, thriller)">
    <input id="style" placeholder="Stile (manga, comics)">
    <button onclick="generate()">Genera consigli</button>
  </div>

  <div class="row-title">🔥 Consigli per te</div>
  <div id="results" class="row"></div>

  <div class="row-title">🌍 Manga & Comics più famosi</div>
  <div id="trend" class="row"></div>

</div>

<script>

const db = [
  {t:"One Piece",img:"https://cdn.myanimelist.net/images/manga/2/253146.jpg",m:"epico",g:"azione"},
  {t:"Naruto",img:"https://cdn.myanimelist.net/images/manga/3/249658.jpg",m:"epico",g:"azione"},
  {t:"Attack on Titan",img:"https://cdn.myanimelist.net/images/manga/2/37846.jpg",m:"oscuro",g:"azione"},
  {t:"Berserk",img:"https://cdn.myanimelist.net/images/manga/1/157897.jpg",m:"oscuro",g:"fantasy"},
  {t:"Death Note",img:"https://cdn.myanimelist.net/images/manga/2/153541.jpg",m:"psicologico",g:"thriller"},
  {t:"Chainsaw Man",img:"https://cdn.myanimelist.net/images/manga/3/216464.jpg",m:"caos",g:"azione"},
  {t:"Jujutsu Kaisen",img:"https://cdn.myanimelist.net/images/manga/3/216292.jpg",m:"oscuro",g:"azione"},
  {t:"Spy x Family",img:"https://cdn.myanimelist.net/images/manga/3/188896.jpg",m:"leggero",g:"azione"},
  {t:"Vinland Saga",img:"https://cdn.myanimelist.net/images/manga/2/159492.jpg",m:"drammatico",g:"azione"},
  {t:"Vagabond",img:"https://cdn.myanimelist.net/images/manga/1/259070.jpg",m:"realistico",g:"azione"},
  {t:"Solo Leveling",img:"https://cdn.myanimelist.net/images/manga/3/222295.jpg",m:"epico",g:"fantasy"},
  {t:"Batman",img:"https://upload.wikimedia.org/wikipedia/en/1/17/Batman_Comic_Book.jpg",m:"oscuro",g:"azione"},
  {t:"Spider-Man",img:"https://upload.wikimedia.org/wikipedia/en/0/0c/Spider-Man_%282002_film%29_poster.jpg",m:"eroe",g:"azione"}
];

function card(item){
  return `<div class='card'><img src='${item.img}'><p>${item.t}</p></div>`;
}

function generate(){
  const mood=document.getElementById("mood").value.toLowerCase();
  const genre=document.getElementById("genre").value.toLowerCase();

  const res=db.filter(x=>(!mood||x.m.includes(mood))&&(!genre||x.g.includes(genre)));

  document.getElementById("results").innerHTML=res.map(card).join("");
}

function loadTrending(){
  const shuffled=[...db].sort(()=>Math.random()-0.5);
  document.getElementById("trend").innerHTML=shuffled.map(card).join("");
}

// DINAMICO (MOVING RANDOM EVERY 3s)
loadTrending();
setInterval(loadTrending,3000);

</script>

</body>
</html>
