<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MANGAMICS</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#000;
      color:#fff;
      overflow-x:hidden;
    }

    /* HEADER NETFLIX STYLE */
    header{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:22px;
      border-bottom:1px solid #111;
      position:sticky;
      top:0;
      background:#000;
      z-index:10;
    }

    .logo{
      font-size:30px;
      letter-spacing:8px;
      font-weight:900;
      text-transform:uppercase;
      color:#fff;
    }

    .container{
      padding:20px;
      max-width:1200px;
      margin:auto;
    }

    /* INPUT PANEL NETFLIX STYLE */
    .panel{
      background:#0b0b0b;
      border:1px solid #222;
      padding:20px;
      border-radius:14px;
      margin-bottom:25px;
    }

    input{
      width:100%;
      padding:14px;
      margin:8px 0;
      border-radius:10px;
      border:1px solid #222;
      background:#111;
      color:#fff;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#fff;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{opacity:0.85;}

    /* ROW STYLE NETFLIX */
    .row-title{
      margin:18px 0 10px;
      font-size:18px;
      font-weight:bold;
    }

    .row{
      display:flex;
      overflow-x:auto;
      gap:12px;
      padding-bottom:10px;
      scroll-snap-type:x mandatory;
    }

    .card{
      min-width:160px;
      background:#111;
      border:1px solid #222;
      border-radius:10px;
      overflow:hidden;
      flex:0 0 auto;
      scroll-snap-align:start;
      transition:0.3s;
    }

    .card:hover{ transform:scale(1.08); }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card p{
      margin:0;
      padding:8px;
      font-size:13px;
      text-align:center;
    }

  </style>
</head>
<body>

<header>
  <div class="logo">MANGAMICS</div>
</header>

<div class="container">

  <div class="panel">
    <h2>Personalizza i tuoi gusti</h2>
    <input id="mood" placeholder="Mood (oscuro, epico, leggero)">
    <input id="genre" placeholder="Genere (azione, fantasy, romance)">
    <input id="style" placeholder="Stile (manga, comics, graphic novel)">
    <button onclick="generate()">Genera consigli</button>
  </div>

  <div class="row-title">🔥 Consigli per te</div>
  <div id="results" class="row"></div>

  <div class="row-title">🌍 Anime & Manga più popolari</div>
  <div id="animeRow" class="row"></div>

  <div class="row-title">🦸 Comics occidentali</div>
  <div id="comicsRow" class="row"></div>

</div>

<script>

const anime = [
  {t:"Attack on Titan",img:"https://cdn.myanimelist.net/images/anime/10/47347.jpg",m:"oscuro",g:"azione"},
  {t:"One Piece",img:"https://cdn.myanimelist.net/images/anime/6/73245.jpg"},
  {t:"Naruto",img:"https://cdn.myanimelist.net/images/anime/13/17405.jpg"},
  {t:"Bleach",img:"https://cdn.myanimelist.net/images/anime/3/40451.jpg"},
  {t:"Jujutsu Kaisen",img:"https://cdn.myanimelist.net/images/anime/1171/109222.jpg"},
  {t:"Chainsaw Man",img:"https://cdn.myanimelist.net/images/anime/1806/126216.jpg"},
  {t:"Demon Slayer",img:"https://cdn.myanimelist.net/images/anime/1286/99889.jpg"},
  {t:"Tokyo Ghoul",img:"https://cdn.myanimelist.net/images/anime/5/64449.jpg"},
  {t:"Berserk",img:"https://cdn.myanimelist.net/images/anime/2/33061.jpg"},
  {t:"Fullmetal Alchemist",img:"https://cdn.myanimelist.net/images/anime/1223/96541.jpg"},
  {t:"Spy x Family",img:"https://cdn.myanimelist.net/images/anime/1441/122795.jpg"},
  {t:"Solo Leveling",img:"https://cdn.myanimelist.net/images/anime/1768/138268.jpg"}
];

const comics = [
  {t:"Batman",img:"https://upload.wikimedia.org/wikipedia/en/1/17/Batman_Comic_Book.jpg"},
  {t:"Spider-Man",img:"https://upload.wikimedia.org/wikipedia/en/0/0c/Spider-Man_%282002_film%29_poster.jpg"},
  {t:"Superman",img:"https://upload.wikimedia.org/wikipedia/en/3/35/Supermanflying.png"},
  {t:"Watchmen",img:"https://upload.wikimedia.org/wikipedia/en/a/a7/Watchmen_first_edition_cover.jpg"},
  {t:"The Boys",img:"https://upload.wikimedia.org/wikipedia/en/4/4c/The_Boys_%28comics%29.jpg"}
];

const db = [...anime];

function card(item){
  return `<div class='card'><img src='${item.img}'><p>${item.t}</p></div>`;
}

function generate(){
  const mood=document.getElementById("mood").value.toLowerCase();
  const genre=document.getElementById("genre").value.toLowerCase();

  const res=db.filter(x=>(!mood||x.m?.includes(mood))&&(!genre||x.g?.includes(genre)));

  document.getElementById("results").innerHTML=res.length?res.map(card).join(""):'<p>Nessun risultato</p>';
}

function loadRows(){
  document.getElementById("animeRow").innerHTML = anime.sort(()=>Math.random()-0.5).map(card).join("");
  document.getElementById("comicsRow").innerHTML = comics.sort(()=>Math.random()-0.5).map(card).join("");
}

loadRows();
</script>

</body>
</html>
